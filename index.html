<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESTRATEGIAT | Login</title>

  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <div class="login-container">

    <div class="left-panel">
      <div class="brand-box">
        <div class="logo">E</div>

        <h1>ESTRATEGIAT</h1>

        <p>
          Sistema Integral de Gestión Operativa y Control Administrativo.
        </p>

        <div class="tags">
          <span>Parque Vehicular</span>
          <span>Requisiciones</span>
          <span>Almacén</span>
          <span>Vales</span>
          <span>Dashboard</span>
        </div>
      </div>
    </div>

    <div class="right-panel">

      <div class="login-card">
        <h2>Bienvenida</h2>
        <p>Inicia sesión para acceder al sistema.</p>

        <div class="input-group">
          <label>Usuario</label>
          <input type="text" id="usuario" placeholder="Ingresa tu usuario">
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="btnLogin">Ingresar</button>

        <p id="mensajeError" class="error"></p>

        <div class="extra">
          <span>v1.0.0</span>
          <span class="status">● Sistema operativo</span>
        </div>
      </div>

    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
