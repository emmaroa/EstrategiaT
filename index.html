<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración de Talleres | Login</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-container">

    <div class="left-panel">
      <div class="brand-box">
        <div class="logo">E</div>

        <h1>Administración de Talleres</h1>

        <p>
          Sistema de gestión de taller, almacén y compras.
        </p>

        <div class="tags">
          <span>Consulta de Parque Vehicular</span>
          <span>Administracion de Requisiciones</span>
          <span>Seguimiento de Acuerdos</span>
          <span>Consulta de Vales</span>
          <span>Dashboard</span>
        </div>
      </div>
    </div>

    <div class="right-panel">

      <div class="login-card">
        <h2>Bienvenido</h2>
        <p>Inicia sesión para acceder al sistema.</p>

        <div class="input-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="username" aria-label="Usuario">
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" aria-label="Contraseña">
        </div>

        <button class="btn" id="btnLogin" type="button">Ingresar</button>

        <p id="mensajeError" class="error" role="alert" aria-live="assertive"></p>

        <div class="extra">
          <span>v1.0.0</span>
          <span class="status">● Proyecto titulacion</span>
        </div>
      </div>

    </div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
</body>
</html>
